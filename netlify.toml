[build]
  functions = "netlify/functions"
  publish = "."

# Scheduled function for GHL drip queue processing (every 5 minutes)
[functions."process-ghl-queue"]
  schedule = "*/5 * * * *"

# Scheduled function for email warmup processing (every hour)
[functions."process-warmup"]
  schedule = "0 * * * *"

# Scheduled function for email sequence processing (every 15 minutes)
[functions."process-sequences"]
  schedule = "*/15 * * * *"

# Scheduled function for workflow wait step processing (every 5 minutes)
[functions."process-workflow-waits"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(self), camera=()"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/app.html"
  status = 200

[[redirects]]
